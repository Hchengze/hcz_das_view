name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

env:
  MPLBACKEND: Agg
  PYTHONUTF8: "1"

jobs:
  test-ubuntu:
    name: test-ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run unit tests
        run: python -B -m pytest -p no:cacheprovider
      - name: Run CLI help smoke
        run: python tools/check_cli_help.py
      - name: Run notebook safety check
        run: python tools/check_notebook_safety.py

  test-windows:
    name: test-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with development dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run unit tests with repository-local temp directory
        shell: pwsh
        run: |
          $env:TMP=(Join-Path (Get-Location) ".tmp_pytest")
          $env:TEMP=$env:TMP
          python -B -m pytest -p no:cacheprovider --basetemp .tmp_pytest\ci_basetemp
      - name: Run CLI help smoke
        shell: pwsh
        run: python tools/check_cli_help.py
      - name: Run notebook safety check
        shell: pwsh
        run: python tools/check_notebook_safety.py

  packaging-smoke:
    name: packaging-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel and source archive
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
      - name: Install built wheel without publishing
        shell: bash
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.whl
          python -c "import das_view; print(das_view.__name__)"

  artifact-safety:
    name: artifact-safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check repository artifact safety
        run: python tools/check_artifacts.py
      - name: Check notebook safety
        run: python tools/check_notebook_safety.py
